<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>服务器状态</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #0a0e1a;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 星空背景动画 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, #1a2a4a 0%, #0a0e1a 60%, #050810 100%);
            z-index: -2;
        }
        
        /* 轨道线条 */
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            transform: translate(-50%, -50%);
            background: 
                radial-gradient(circle at 30% 40%, transparent 30%, rgba(30, 80, 150, 0.03) 40%, transparent 50%),
                radial-gradient(circle at 70% 60%, transparent 40%, rgba(30, 80, 150, 0.04) 55%, transparent 70%),
                radial-gradient(circle at 50% 50%, transparent 60%, rgba(20, 100, 200, 0.02) 80%, transparent 100%);
            border-radius: 50%;
            z-index: -1;
            animation: orbit-rotate 120s linear infinite;
        }
        
        @keyframes orbit-rotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* 星星闪烁 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            background: 
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.6), transparent),
                radial-gradient(2px 2px at 40% 30%, rgba(180,220,255,0.7), transparent),
                radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,0.5), transparent),
                radial-gradient(2px 2px at 70% 15%, rgba(200,230,255,0.8), transparent),
                radial-gradient(1px 1px at 85% 50%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 90% 90%, rgba(180,220,255,0.5), transparent),
                radial-gradient(1px 1px at 50% 45%, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 30% 10%, rgba(255,255,255,0.5), transparent);
            background-size: 200% 200%;
            animation: stars-twinkle 4s ease-in-out infinite alternate;
        }
        
        @keyframes stars-twinkle {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }
        
        /* 标题区域 - 毛玻璃效果 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: rgba(15, 30, 50, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(100, 180, 255, 0.15);
            border-radius: 30px;
            box-shadow: 
                0 10px 40px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(30, 100, 200, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        h1 {
            font-size: 2.8em;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #c0e0ff 0%, #ffffff 40%, #a0d0ff 60%, #e0f0ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 
                0 0 30px rgba(100, 180, 255, 0.5),
                0 0 60px rgba(50, 100, 200, 0.3);
            margin-bottom: 10px;
            animation: title-glow 3s ease-in-out infinite alternate;
            word-break: break-word;
        }
        
        @keyframes title-glow {
            0% { text-shadow: 0 0 20px rgba(100, 180, 255, 0.4), 0 0 40px rgba(50, 100, 200, 0.2); }
            100% { text-shadow: 0 0 40px rgba(150, 220, 255, 0.6), 0 0 80px rgba(80, 150, 255, 0.3); }
        }
        
        .subtitle {
            color: rgba(200, 220, 255, 0.7);
            font-size: 0.95em;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        /* 统计栏 - 毛玻璃 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 18px 30px;
            background: rgba(10, 25, 45, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(80, 160, 255, 0.2);
            border-radius: 20px;
            box-shadow: 
                0 5px 20px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
            gap: 20px;
        }
        
        .total-info {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        
        .stat-label {
            color: rgba(180, 210, 255, 0.6);
            font-size: 0.95em;
            letter-spacing: 1px;
        }
        
        .stat-value {
            color: #e0f0ff;
            font-size: 2em;
            font-weight: 300;
            text-shadow: 0 0 20px rgba(100, 180, 255, 0.5);
        }
        
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(180, 210, 255, 0.6);
        }
        
        .refresh-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #60c0ff;
            box-shadow: 0 0 15px #40a0ff, 0 0 30px #2080ff;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 15px #40a0ff, 0 0 30px #2080ff; }
            50% { opacity: 0.5; box-shadow: 0 0 8px #40a0ff, 0 0 15px #2080ff; }
        }
        
        /* 服务器网格 */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 22px;
        }
        
        /* 服务器卡片 - 毛玻璃效果 */
        .server-card {
            background: rgba(15, 35, 55, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(100, 180, 255, 0.2);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 8px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
        }
        
        .server-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(100, 180, 255, 0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .server-card:hover {
            transform: translateY(-5px);
            background: rgba(20, 45, 70, 0.55);
            border-color: rgba(120, 200, 255, 0.4);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(50, 150, 255, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }
        
        .server-card:hover::before {
            opacity: 1;
        }
        
        /* 状态边框颜色 */
        .server-card.in-progress {
            border-left: 3px solid #40c060;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4), 0 0 20px rgba(64, 192, 96, 0.1);
        }
        
        .server-card.waiting {
            border-left: 3px solid #ffc040;
        }
        
        .server-card.offline {
            border-left: 3px solid #ff4060;
            opacity: 0.7;
        }
        
        /* 卡片头部 - 修复布局 */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            gap: 12px;
            min-width: 0;
        }
        
        .server-name {
            font-size: 1.3em;
            font-weight: 400;
            color: #e8f4ff;
            text-shadow: 0 0 10px rgba(100, 180, 255, 0.3);
            letter-spacing: 1px;
            word-break: break-word;
            overflow-wrap: break-word;
            flex: 1;
            min-width: 0;
            line-height: 1.4;
        }
        
        .badge-container {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        
        .server-badge {
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7em;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .badge-rush-pvp {
            background: rgba(200, 60, 80, 0.3);
            color: #ffb0b0;
            border-color: rgba(255, 100, 100, 0.3);
            text-shadow: 0 0 8px rgba(255, 80, 80, 0.5);
        }
        
        .badge-rush-pve {
            background: rgba(40, 120, 200, 0.3);
            color: #a0d0ff;
            border-color: rgba(100, 180, 255, 0.3);
            text-shadow: 0 0 8px rgba(80, 160, 255, 0.5);
        }
        
        .badge-pvp {
            background: rgba(200, 60, 80, 0.3);
            color: #ffb0b0;
            border-color: rgba(255, 100, 100, 0.3);
        }
        
        .badge-pve {
            background: rgba(40, 120, 200, 0.3);
            color: #a0d0ff;
            border-color: rgba(100, 180, 255, 0.3);
        }
        
        /* 通用区域标签样式 */
        .badge-region {
            background: rgba(100, 100, 150, 0.3);
            color: #d0d0ff;
            border-color: rgba(150, 150, 200, 0.3);
        }
        
        .card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 18px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        
        .info-label {
            font-size: 0.7em;
            color: rgba(160, 200, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .info-value {
            font-size: 1.1em;
            font-weight: 400;
            color: #d0e8ff;
            display: flex;
            align-items: center;
            gap: 6px;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        
        .players-bar {
            margin-top: 8px;
            padding-top: 18px;
            border-top: 1px solid rgba(100, 160, 255, 0.15);
        }
        
        .players-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: rgba(180, 210, 255, 0.7);
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        
        .progress-container {
            height: 6px;
            background: rgba(0, 20, 40, 0.6);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #40a0ff, #80d0ff, #40a0ff);
            border-radius: 10px;
            box-shadow: 0 0 15px #40a0ff;
            transition: width 0.5s ease;
        }
        
        .card-footer {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(100, 160, 255, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
            color: rgba(160, 200, 255, 0.6);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .connect-info {
            font-family: 'Consolas', 'Monaco', monospace;
            background: rgba(0, 15, 30, 0.5);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(100, 180, 255, 0.2);
            color: #b0d8ff;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }
        
        .status-dot.online { 
            background: #40c060; 
            color: #40c060;
            box-shadow: 0 0 15px #40c060;
        }
        
        .status-dot.waiting { 
            background: #ffc040; 
            color: #ffc040;
        }
        
        .status-dot.offline { 
            background: #ff4060; 
            color: #ff4060;
        }
        
        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            background: rgba(15, 35, 55, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 180, 255, 0.15);
            border-radius: 40px;
        }
        
        .empty-state h3 {
            font-size: 1.6em;
            font-weight: 300;
            color: #a0c8ff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(100, 160, 255, 0.3);
        }
        
        .empty-state p {
            color: rgba(140, 180, 220, 0.6);
            font-size: 1em;
            letter-spacing: 1px;
        }
        
        .footer {
            margin-top: 40px;
            text-align: center;
            color: rgba(100, 150, 200, 0.4);
            font-size: 0.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            body { 
                padding: 12px; 
            }
            
            h1 { 
                font-size: 2em; 
                letter-spacing: 4px; 
            }
            
            .header {
                padding: 20px 15px;
                margin-bottom: 20px;
            }
            
            .stats-bar { 
                flex-direction: column; 
                align-items: flex-start; 
                padding: 15px 18px;
                gap: 15px;
            }
            
            .total-info { 
                gap: 20px; 
                width: 100%;
            }
            
            .stat-item {
                gap: 5px;
            }
            
            .stat-value { 
                font-size: 1.5em; 
            }
            
            .stat-label {
                font-size: 0.85em;
            }
            
            .server-grid { 
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .server-card { 
                padding: 18px; 
            }
            
            .card-body {
                gap: 12px;
            }
            
            .info-value {
                font-size: 1em;
            }
            
            .connect-info {
                font-size: 0.8em;
                padding: 5px 10px;
            }
        }
        
        @media (max-width: 480px) {
            .card-header {
                flex-wrap: wrap;
            }
            
            .server-name {
                font-size: 1.1em;
                width: 100%;
            }
            
            .badge-container {
                justify-content: flex-start;
            }
            
            .server-badge {
                padding: 4px 10px;
                font-size: 0.65em;
            }
        }
        
        @media (max-width: 380px) {
            .server-card {
                padding: 14px;
            }
            
            .card-header {
                margin-bottom: 15px;
            }
            
            .server-name {
                font-size: 1em;
            }
            
            .server-badge {
                padding: 3px 8px;
                font-size: 0.6em;
            }
            
            .card-body {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .info-item {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            
            .info-label {
                white-space: nowrap;
            }
            
            .players-header {
                font-size: 0.8em;
            }
            
            .card-footer {
                margin-top: 14px;
                padding-top: 14px;
            }
        }
        
        /* 网格容器响应式 */
        @media (min-width: 1400px) {
            .server-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 1000px) and (max-width: 1399px) {
            .server-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 600px) and (max-width: 999px) {
            .server-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <div class="header">
            <h1>WANG边境服务器</h1>
            <div class="subtitle">实时状态 · 自动刷新</div>
        </div>
        
        <div class="stats-bar">
            <div class="total-info">
                <div class="stat-item">
                    <span class="stat-label">在线服务器</span>
                    <span class="stat-value" id="totalServers">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">当前玩家</span>
                    <span class="stat-value" id="totalPlayers">0</span>
                </div>
            </div>
            <div class="refresh-indicator">
                <div class="refresh-dot"></div>
                <span id="lastUpdate">刚刚</span>
            </div>
        </div>

        <div id="serverGrid" class="server-grid">
            <div class="empty-state">
                <h3>🛰️ 正在扫描信号...</h3>
                <p>等待服务器响应</p>
            </div>
        </div>
        
        <div class="footer">
            WANG
        </div>
    </div>

    <script>
        const API_URL = '/servers';
        
        // 状态配置
        const stateConfig = {
            'InProgress': { label: '游戏中', color: '#40c060', class: 'in-progress', dotClass: 'online' },
            'Waiting': { label: '等待中', color: '#ffc040', class: 'waiting', dotClass: 'waiting' },
            'InvalidState': { label: '未就绪', color: '#808080', class: 'invalid', dotClass: 'offline' },
            'Offline': { label: '离线', color: '#ff4060', class: 'offline', dotClass: 'offline' },
            'Starting': { label: '启动中', color: '#4080ff', class: 'waiting', dotClass: 'waiting' }
        };
        
        // 模式配置
        const modeConfig = {
            'PVP': { class: 'badge-pvp' },
            'PVE': { class: 'badge-pve' },
            'RUSH PVP': { class: 'badge-rush-pvp' },
            'RUSH PVE': { class: 'badge-rush-pve' }
        };

        // 根据区域值返回对应的样式类
        function getRegionClass(region) {
            // 如果区域是标准的两字母代码，可以用自定义样式
            // 否则使用通用的 badge-region 样式
            const upperRegion = region.toUpperCase();
            if (['CN', 'NA', 'EU', 'HK', 'TW', 'JP', 'KR', 'SG'].includes(upperRegion)) {
                return 'badge-region';
            }
            return 'badge-region';
        }

        function formatTimeAgo(timestamp) {
            const seconds = Math.floor((Date.now() - timestamp) / 1000);
            if (seconds < 5) return '刚刚';
            if (seconds < 60) return `${seconds} 秒前`;
            if (seconds < 3600) return `${Math.floor(seconds / 60)} 分钟前`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} 小时前`;
            return `${Math.floor(seconds / 86400)} 天前`;
        }

        function createServerCard(server) {
            const state = stateConfig[server.serverState] || { 
                label: server.serverState, 
                color: '#808080', 
                class: 'invalid',
                dotClass: 'offline'
            };
            
            const maxPlayers = 10;
            const fillPercent = Math.min((server.playerCount / maxPlayers) * 100, 100);
            const timeAgo = formatTimeAgo(server.lastHeartbeat);
            
            // 直接使用原始区域值
            const region = server.region || '??';
            const regionClass = getRegionClass(region);
            
            // 获取模式样式
            const mode = modeConfig[server.mode] || { class: 'badge-pve' };
            
            return `
                <div class="server-card ${state.class}">
                    <div class="card-header">
                        <span class="server-name">${server.name}</span>
                        <div class="badge-container">
                            <span class="server-badge ${mode.class}">${server.mode}</span>
                            <span class="server-badge ${regionClass}">${region}</span>
                        </div>
                    </div>
                    
                    <div class="card-body">
                        <div class="info-item">
                            <span class="info-label">地图</span>
                            <span class="info-value">🗺️ ${server.map}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">状态</span>
                            <span class="info-value">
                                <span class="status-dot ${state.dotClass}"></span>
                                ${state.label}
                            </span>
                        </div>
                    </div>
                    
                    <div class="players-bar">
                        <div class="players-header">
                            <span>👥 玩家</span>
                            <span><strong>${server.playerCount}</strong> / ${maxPlayers}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${fillPercent}%;"></div>
                        </div>
                    </div>
                    
                    <div class="card-footer">
                        <span class="connect-info">🔌 端口 ${server.port}</span>
                        <div class="status-indicator">
                            <span class="status-dot ${state.dotClass}"></span>
                            <span>${timeAgo}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function updateStats(servers) {
            document.getElementById('totalServers').textContent = servers.length;
            document.getElementById('totalPlayers').textContent = servers.reduce((sum, s) => sum + (s.playerCount || 0), 0);
        }

        function renderServers(servers) {
            const grid = document.getElementById('serverGrid');
            
            if (!servers || servers.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <h3>🛰️ 暂无信号</h3>
                        <p>等待服务器广播...</p>
                    </div>
                `;
                updateStats([]);
                return;
            }
            
            grid.innerHTML = servers.map(createServerCard).join('');
            updateStats(servers);
        }

        async function loadServers() {
            try {
                const response = await fetch(API_URL);
                const servers = await response.json();
                renderServers(servers);
                document.getElementById('lastUpdate').textContent = '刚刚';
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('serverGrid').innerHTML = `
                    <div class="empty-state">
                        <h3>❌ 连接中断</h3>
                        <p>无法连接到深空网络</p>
                    </div>
                `;
            }
        }

        // 初始加载
        loadServers();
        
        // 每 5 秒刷新
        setInterval(loadServers, 5000);
        
        // 更新时间显示
        let secondsSinceUpdate = 0;
        setInterval(() => {
            secondsSinceUpdate++;
            const el = document.getElementById('lastUpdate');
            if (el) {
                if (secondsSinceUpdate <= 60) {
                    el.textContent = `${secondsSinceUpdate} 秒前`;
                } else {
                    el.textContent = `${Math.floor(secondsSinceUpdate / 60)} 分钟前`;
                }
            }
        }, 1000);
        
        // 重置计数器
        const originalLoad = loadServers;
        loadServers = async function() {
            secondsSinceUpdate = 0;
            await originalLoad();
        };
    </script>
</body>
</html>
